<!DOCTYPE html>
<html>
<head>
  <title>My Rupee Advisor | Index Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #f4f6f9;
    }

    .header {
      background: linear-gradient(90deg, #0d6efd, #0b5ed7);
      color: white;
      padding: 18px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    .container {
      max-width: 1100px;
      margin: 20px auto;
      background: white;
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      padding: 20px;
    }

    .tabs {
      display: flex;
      justify-content: center;
      margin-bottom: 15px;
    }

    .tabs button {
      padding: 10px 25px;
      margin: 5px;
      border: none;
      cursor: pointer;
      background: #e0e0e0;
      border-radius: 30px;
      font-weight: bold;
      transition: 0.3s;
    }

    .tabs button.active {
      background: #0d6efd;
      color: white;
    }

    .info {
      text-align: center;
      margin-bottom: 10px;
      font-weight: bold;
      color: #333;
    }

    iframe {
      width: 100%;
      height: 75vh;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    .loader {
      text-align: center;
      padding: 30px;
      font-weight: bold;
      color: #666;
    }

    .footer {
      text-align: center;
      font-size: 13px;
      color: #777;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="header">
📊 My Rupee Advisor – Index Dashboard (Auto Updated)
</div>

<div class="container">

  <div class="tabs">
    <button id="bseBtn" onclick="loadPDF('bse')">BSE</button>
    <button id="nseBtn" onclick="loadPDF('nse')">NSE</button>
  </div>

  <div class="info" id="info">Loading...</div>

  <div id="loader" class="loader">Fetching latest data...</div>

  <iframe id="pdfFrame" style="display:none;"></iframe>

  <div class="footer">
    Data Source: BSE & NSE | For informational purposes only
  </div>

</div>

<script>

const API = "https://index-dashboard-system-1.onrender.com/api";

function loadPDF(type) {

  // Tab highlight
  document.getElementById("bseBtn").classList.remove("active");
  document.getElementById("nseBtn").classList.remove("active");
  document.getElementById(type + "Btn").classList.add("active");

  // UI reset
  document.getElementById("info").innerText = "Loading...";
  document.getElementById("loader").style.display = "block";
  document.getElementById("pdfFrame").style.display = "none";

  fetch(`${API}/${type}-pdf`)
  .then(res => res.json())
  .then(data => {

    if(data.pdf_url){

      // 🔥 IMPORTANT: Zoom applied
      const pdfURL = data.pdf_url + "#zoom=135";

      document.getElementById("pdfFrame").src = pdfURL;

      document.getElementById("info").innerText =
        `${data.source} Dashboard – ${data.month}`;

      document.getElementById("loader").style.display = "none";
      document.getElementById("pdfFrame").style.display = "block";

    } else {

      document.getElementById("info").innerText = "PDF not available";
      document.getElementById("loader").innerText = "No data found";

    }

  })
  .catch(() => {
    document.getElementById("info").innerText = "Error loading data";
    document.getElementById("loader").innerText = "Something went wrong";
  });
}

// Default load
loadPDF('bse');

</script>

</body>
</html>
